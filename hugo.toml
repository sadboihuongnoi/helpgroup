baseURL = "https://helpgroup.netlify.app/"
defaultContentLanguage = "vi"
defaultContentLanguageInSubdir = false
title = "Research Lab"
enableRobotsTXT = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"

# ========== LANGUAGES ==========
[languages]

  [languages.vi]
    languageCode = "vi"
    languageName = "Tiếng Việt"
    title = "Research Lab"
    weight = 1
    [languages.vi.params]
      description = "Trang web giới thiệu nhóm nghiên cứu"
    [[languages.vi.menus.main]]
      name = "Lĩnh vực nghiên cứu"
      url = "/#research"
      weight = 1
    [[languages.vi.menus.main]]
      name = "Thành viên"
      url = "/#members"
      weight = 2
    [[languages.vi.menus.main]]
      name = "Bài báo"
      url = "/#publications"
      weight = 3
    [[languages.vi.menus.main]]
      name = "Dự án"
      url = "/#projects"
      weight = 4
    [[languages.vi.menus.main]]
      name = "Tin tức"
      url = "/#news"
      weight = 5
    [[languages.vi.menus.main]]
      name = "Liên hệ"
      url = "/#contact"

{{ define "main" }}
<section class="section">
  <div class="container">
    <header class="section-head">
      <h1>{{ .Title }}</h1>
    </header>

    <ul class="simple-list">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          {{ if not .Date.IsZero }}<time class="muted">— {{ .Date.Format "02 Jan 2006" }}</time>{{ end }}
        </li>
      {{ end }}
    </ul>

    <p><a class="link-arrow" href="{{ "" | relLangURL }}">{{ i18n "ui_back_home" }}</a></p>
  </div>
</section>
{{ end }}

{{ define "main" }}
<article class="section">
  <div class="container narrow">
    <header class="section-head" style="text-align:left;">
      <p class="muted"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time></p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}<p class="muted">{{ . }}</p>{{ end }}
    </header>

    {{ with .Params.image }}
      <p><img src="{{ . | relURL }}" alt="{{ $.Title }}" /></p>
    {{ end }}

    {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}

    {{ with .Params.link }}
      <p><a class="btn btn-primary" href="{{ . }}" target="_blank" rel="noopener">{{ i18n "ui_external_link" }} →</a></p>
    {{ end }}

    <p><a class="link-arrow" href="{{ "news/" | relLangURL }}">{{ i18n "ui_back_news" }}</a></p>
  </div>
</article>
{{ end }}

{{ $lang := .Site.Language.Lang }}
{{ $stats := index .Site.Data $lang "stats" }}
{{ with $stats }}
<section class="about-stats" id="about">
  <div class="container">
    <div class="about-head about-head--solo">
      <div>
        <h2 class="about-title">{{ .heading }}</h2>
        <p class="about-desc">{{ .description }}</p>
      </div>
      {{ with .logo }}
        <div class="about-logo">
          <img src="{{ . | relURL }}" alt="{{ $.Site.Title }} logo" loading="lazy" />
          {{ with $stats.logo_caption }}<p class="about-logo-caption">{{ . }}</p>{{ end }}
        </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}

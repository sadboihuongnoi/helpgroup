{{ $lang := .Site.Language.Lang }}
{{ $stats := index .Site.Data $lang "stats" }}
{{ with $stats }}
  {{ with .items }}
    <section class="section stats-section" id="stats">
      <div class="container">
        <div class="stats-grid">
          {{ range . }}
            <div class="stat-item">
              <p class="stat-value" data-counter="{{ .value }}">{{ .value }}</p>
              <p class="stat-label">{{ .label }}</p>
            </div>
          {{ end }}
        </div>
      </div>
    </section>
  {{ end }}
{{ end }}

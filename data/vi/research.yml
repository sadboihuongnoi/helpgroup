heading: "Lĩnh vực nghiên cứu"
subtitle: "Các hướng nghiên cứu trọng tâm của nhóm."
items:
  - title: "Đánh giá Công nghệ Y tế & Kinh tế Dược"
    subtitle: "Health Technology Assessment (HTA) & Pharmacoeconomics"
    summary: "Phân tích chi phí - hiệu quả và đánh giá kinh tế cho dược phẩm, vắc-xin và các can thiệp y tế."
    details: >-
      Thực hiện các phân tích chi phí - hiệu quả (Cost-effectiveness analysis – CEA / Cost-utility
      analysis – CUA), phân tích tác động ngân sách (Budget impact analysis – BIA) và đánh giá kinh tế
      đối với dược phẩm, vắc-xin và các can thiệp y tế nhằm hỗ trợ công tác xây dựng danh mục thuốc
      và chi trả Bảo hiểm Y tế (BHYT).
  - title: "Tổng hợp Bằng chứng & Y học Thực chứng"
    subtitle: "Evidence Synthesis & Evidence-based Medicine"
    summary: "Tổng quan hệ thống, phân tích gộp và đánh giá chất lượng bằng chứng lâm sàng."
    details: >-
      Triển khai các nghiên cứu tổng quan hệ thống (Systematic Review), phân tích gộp (Meta-analysis)
      và đánh giá chất lượng bằng chứng lâm sàng để xây dựng các hướng dẫn điều trị và chính sách y tế.
  - title: "Dịch tễ Dược & Dữ liệu đời thực"
    subtitle: "Health Outcomes Research & Real-World Evidence"
    summary: "Nghiên cứu hiệu quả, an toàn và tuân thủ điều trị qua dữ liệu lớn và hồ sơ sức khỏe điện tử."
    details: >-
      Nghiên cứu tính hiệu quả, an toàn, và sự tuân thủ điều trị của thuốc trong cộng đồng thông qua
      việc khai thác, phân tích dữ liệu lớn (Big Data) và hồ sơ sức khỏe điện tử.
  - title: "Phân tích & Tư vấn Chính sách Y tế"
    subtitle: "Health Policy & Implementation Research"
    summary: "Xây dựng báo cáo kỹ thuật và đề xuất giải pháp chính sách y tế dựa trên bằng chứng."
    details: >-
      Vận dụng các kết quả nghiên cứu để xây dựng báo cáo kỹ thuật và đề xuất các giải pháp chính sách
      nhằm tối ưu hóa nguồn lực y tế và nâng cao hiệu quả trong chăm sóc sức khỏe cộng đồng.

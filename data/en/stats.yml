heading: "Health Evidence Linkage to Policy Research Group (HELP Group)"
description: "Guided by the strategic orientation “Research for policy support”, HELP Group was established to provide real-world evidence and scientific solutions for pressing issues of the health sector. Our goal is to build a dynamic research ecosystem where health technology assessment (HTA) results and evidence syntheses are translated into feasible policy recommendations, improving access to medicines and health interventions and promoting equity in community health care."

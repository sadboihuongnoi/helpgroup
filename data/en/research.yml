heading: "Research Areas"
subtitle: "Our group's core research directions."
items:
  - title: "Health Technology Assessment & Pharmacoeconomics"
    subtitle: "HTA & Pharmacoeconomics"
    summary: "Cost-effectiveness analyses and economic evaluation of medicines, vaccines and health interventions."
    details: >-
      Conducting cost-effectiveness analysis (CEA), cost-utility analysis (CUA), budget impact
      analysis (BIA) and economic evaluations of pharmaceuticals, vaccines and health interventions
      to support drug formulary development and Health Insurance reimbursement decisions.
  - title: "Evidence Synthesis & Evidence-based Medicine"
    subtitle: "Evidence Synthesis & EBM"
    summary: "Systematic reviews, meta-analyses and clinical evidence quality appraisal."
    details: >-
      Carrying out systematic reviews, meta-analyses and clinical evidence quality assessments to
      inform treatment guidelines and health policies.
  - title: "Health Outcomes Research & Real-World Evidence"
    subtitle: "Pharmacoepidemiology & RWE"
    summary: "Effectiveness, safety and adherence studies using big data and electronic health records."
    details: >-
      Studying the real-world effectiveness, safety and treatment adherence of medicines in the
      community by mining and analysing big data and electronic health records.
  - title: "Health Policy Analysis & Consulting"
    subtitle: "Health Policy & Implementation Research"
    summary: "Evidence-based technical reports and policy recommendations for the health system."
    details: >-
      Translating research findings into technical reports and policy recommendations to optimise
      healthcare resources and improve the effectiveness of community health care.
